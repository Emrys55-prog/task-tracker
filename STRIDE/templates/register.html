<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — STRIDE</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
            <path d="M4 18 L10 10 L14 14 L20 6" />
          </svg>
        </div>
        <span>STRIDE</span>
      </div>

      <h1>Create your account</h1>
      <p class="auth-sub">Start tracking tasks in under a minute.</p>

      {% with messages = get_flashed_messages() %}
      {% if messages %}
      {% for m in messages %}
      <div class="flash">{{ m }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('register') }}">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="8">
        </div>
        <button type="submit" class="btn-primary">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
  </div>
</body>

</html>
